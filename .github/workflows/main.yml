name: Build APK

on:
  push:
    branches:
      - "main"   # nhánh chính
  pull_request:
    branches:
      - "main"
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code từ đúng nhánh
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # Setup JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Make gradlew executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build APK (Release)
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # Upload APK as artifact (tên random + xoá sau 1 ngày)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Build-APK-${{ github.run_id }}   # random unique name
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1   # auto delete after 1 day
